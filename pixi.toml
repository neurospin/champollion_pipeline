[workspace]
name = "champollion"
version = "0.2.0"
description = "Champollion pipeline with cortical_tiles, champollion_utils, and testing infrastructure"
channels = ["https://brainvisa.info/neuro-forge", "pytorch", "nvidia", "conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.8"
soma-env = ">=0.0"
libjpeg-turbo = { channel = "conda-forge", version = ">=3.0" }
anatomist = ">=0.0.29"
morphologist = ">=0.0.29"
disco = ">=6.0"
pip = ">=25.3,<26"
setuptools = ">=65.0,<81"
pytest = ">=7.0"
pytest-cov = ">=4.0"
pytest-mock = ">=3.10"

[pypi-dependencies]
dracopy = ">=1.4.2"
huggingface-hub = ">=0.20.0"
transformers = ">=4.36.0"
datasets = ">=2.16.0,<4.5"
ruff = ">=0.9.0"
pip-audit = ">=2.7.0"
hypothesis = ">=6.0"
umap-learn = ">=0.5"

[tasks]
# Initialize submodules
init-submodules = "git submodule update --init --recursive"

# Install cortical_tiles in editable mode
install-cortical-tiles = "cd external/cortical_tiles && SKLEARN_ALLOW_DEPRECATED_SKLEARN_PACKAGE_INSTALL=True pip install -e ."

# Install Champollion v1 in editable mode
install-champollion = "cd external/champollion_V1 && pip install -e ."

# Install champollion_utils in editable mode
install-utils = """
  cd .. && git clone https://github.com/neurospin/champollion_utils.git 2>/dev/null || echo 'champollion_utils already exists' && \
  cd champollion_utils && pip install -e . && cd ..
"""

# Create data directory
setup-data = "mkdir -p ../data"

# Global task to install everything
install-all = { depends-on = ["init-submodules", "install-cortical-tiles", "install-champollion", "install-utils", "setup-data", "test-smoke"] }

# Pull latest changes for the main champollion_pipeline repo.
# pixi.lock is tracked by git but regenerated locally by pixi, which causes
# conflicts on git pull.  We resolve this by always taking the remote version
# of pixi.lock: fetch first, overwrite the lock from FETCH_HEAD, then merge.
update-pipeline = "git fetch && git checkout FETCH_HEAD -- pixi.lock && git merge FETCH_HEAD"

# Update git submodules to latest commits on their tracked branches
# --init handles the case where submodules were never initialized (first run)
update-submodules = """
  git submodule update --init --remote --merge external/champollion_V1 && \
  git submodule update --init --remote --merge external/cortical_tiles
"""

# Update champollion_utils (pull latest from main)
update-utils = """
  cd ../champollion_utils && git pull origin main 2>/dev/null || echo 'champollion_utils not found or pull failed'
"""

# Reinstall Python packages to pick up dependency changes
reinstall-packages = """
  cd external/cortical_tiles && SKLEARN_ALLOW_DEPRECATED_SKLEARN_PACKAGE_INSTALL=True pip install -e . && \
  cd ../champollion_V1 && pip install -e . && \
  cd ../../.. && cd champollion_utils && pip install -e . && cd ..
"""

# Full update: pull repos and reinstall packages
update = { depends-on = ["update-pipeline", "update-submodules", "update-utils", "reinstall-packages"] }

# Uninstall task: removes cloned repos, installed packages, and data
uninstall = """
  git submodule deinit -f external/champollion_V1 && \
  git submodule deinit -f external/cortical_tiles && \
  rm -rf external/champollion_V1 external/cortical_tiles && \
  rm -rf ../champollion_utils && \
  pip uninstall dracopy cortical_tiles champollion_V1 champollion_utils -y && \
  rm -rf data && \
  echo "Uninstallation complete."
"""

# Uninstall everything, including Pixi-managed dependencies
uninstall-all = """
  rm -rf .pixi pixi.lock && \
  rm -rf external/champollion_V1 external/cortical_tiles && \
  rm -rf ../champollion_utils && \
  rm -rf data && \
  echo "Uninstallation of Pixi-managed dependencies complete."
"""

# Linting tasks
lint = "ruff check src/ tests/"
lint-fix = "ruff check --fix src/ tests/"
format = "ruff format src/ tests/"
audit = "pip-audit"

# Testing tasks
test = "pytest tests/ -v"
test-unit = "pytest tests/ -v -m unit"
test-integration = "pytest tests/ -v -m integration"
test-smoke = "pytest tests/ -v -m smoke"
test-cov = "pytest tests/ -v --cov=src --cov-report=html --cov-report=term"
test-fast = "pytest tests/ -v -x --tb=short"
test-verbose = "pytest tests/ -vv"
test-specific = "pytest"  # Usage: pixi run test-specific tests/test_script_builder.py

# Generate UMAP reference models for all ROIs
# Usage: pixi run generate-umap-reference --models_dir /path/to/Champollion_V1_after_ablation --reference_subpath ukb40_random_embeddings/full_embeddings.csv
generate-umap-reference = "python3 src/generate_umap_reference.py"

# Generate sulcal mask files from manually labelled graphs
# Usage: pixi run generate-masks --labeled_subjects_dir /path/to/subjects --path_to_graph_supervised "t1mri/t1/default_analysis/folds/3.3/base2026_manual" --output_dir /path/to/masks
generate-masks = "python3 src/generate_masks.py"

# Check sulcal labeling coverage per subject in a BrainVISA database
# Usage: pixi run check-labeling --labeled_subjects_dir /path/to/db --path_to_graph "t1mri/t1/default_analysis/folds/3.3/base2018b_manual" --side both --output /tmp/labeling.csv
check-labeling = "python3 src/check_labeling.py"

# Compare sulcal labeling between two graph annotation campaigns + optional mask sets
# Usage: pixi run compare-databases --labeled_subjects_dir /path/to/db --path_to_graph_a "...base2018_manual" --path_to_graph_b "...base2018b_manual" --label_a base2018 --label_b base2018b --masks_a external/cortical_tiles/data/mask/canonical_25/2mm --masks_b /path/to/new/masks/2.0 --output /tmp/comparison.csv
compare-databases = "python3 src/compare_databases.py"

# Remove cortical_tiles outputs for subjects that failed QC
# Usage: pixi run prune-failed-subjects /path/to/output --qc /path/to/qc.tsv [--dry-run]
prune-failed-subjects = "python3 src/prune_failed_subjects.py"
