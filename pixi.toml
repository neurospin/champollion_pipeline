[workspace]
name = "champollion"
version = "0.2.4"
description = "Champollion pipeline with cortical_tiles, champollion_utils, and testing infrastructure"
channels = ["https://brainvisa.info/neuro-forge", "pytorch", "nvidia", "conda-forge"]
platforms = ["linux-64"]

# ── Shared base (dev tools, always present in default env) ───────────────────
[dependencies]
python = ">=3.8"
pip = ">=25.3,<26"
setuptools = ">=65.0,<81"
pytest = ">=7.0"
pytest-cov = ">=4.0"
pytest-mock = ">=3.10"
git-filter-repo = ">=2.47.0,<3"

[pypi-dependencies]
ruff = ">=0.9.0"
pip-audit = ">=2.7.0"
hypothesis = ">=6.0"
scipy = ">=1.10"
numpy = ">=1.24"
joblib = ">=1.3"

# ── BrainVISA feature (morphologist graphs + snapshots) ──────────────────────
[feature.brainvisa.dependencies]
python = ">=3.8"
pip = ">=25.3,<26"
setuptools = ">=65.0,<81"
soma-env = ">=0.0"
libjpeg-turbo = { channel = "conda-forge", version = ">=3.0" }
anatomist = ">=0.0.29"
morphologist = ">=0.0.29"
disco = ">=6.0"

[feature.brainvisa.tasks]
install-utils = """
  cd .. && git clone https://github.com/neurospin/champollion_utils.git 2>/dev/null || echo 'champollion_utils already exists' && \
  cd champollion_utils && pip install -e . && cd ..
"""
morphologist = "python3 src/generate_morphologist_graphs.py"
snapshots = "python3 src/generate_snapshots.py"

# ── Cortical-tiles feature (crop generation) ──────────────────────────────────
[feature.cortical-tiles.pypi-dependencies]
dracopy = ">=1.4.2"

[feature.cortical-tiles.tasks]
install-cortical-tiles = "cd external/cortical_tiles && SKLEARN_ALLOW_DEPRECATED_SKLEARN_PACKAGE_INSTALL=True pip install -e ."
cortical-tiles = "python3 src/run_cortical_tiles.py"
prune-failed-subjects = "python3 src/prune_failed_subjects.py"
purge-subject = "python3 src/purge_subject.py"

# ── Embeddings feature (inference + training) ─────────────────────────────────
[feature.embeddings.dependencies]
python = ">=3.8"
pip = ">=25.3,<26"
setuptools = ">=65.0,<81"
pytorch-cuda = { channel = "pytorch", version = "12.4.*" }
torchvision = { channel = "pytorch", version = ">=0.15" }

[feature.embeddings.pypi-dependencies]
huggingface-hub = ">=0.20.0"
transformers = ">=4.36.0"
datasets = ">=2.16.0,<4.5"
umap-learn = ">=0.5"
hydra-core = ">=1.3"
hydra-joblib-launcher = ">=1.2"
omegaconf = ">=2.3"
pytorch-lightning = "==2.1.3"
lightly = ">=1.4"
tqdm = ">=4.0"
tensorboard = ">=2.0"
scikit-learn = ">=0.24"
scikit-image = ">=0.19"
psutil = ">=5.0"
pqdm = ">=0.2"
matplotlib = ">=3.5"
plotly = ">=5.0"
seaborn = ">=0.12"
kornia = ">=0.6"
timm = ">=0.9"
sparse = ">=0.14"
captum = ">=0.6"
wandb = ">=0.15"
statsmodels = ">=0.14"
toolz = ">=0.12"
torchinfo = ">=1.7"
kaleido = ">=0.2"
odfpy = ">=1.4"
pandas = ">=1.5"

[feature.embeddings.activation]
env = { LD_LIBRARY_PATH = "$CONDA_PREFIX/lib:$CONDA_PREFIX/lib/python3.11/site-packages/torch/lib:${LD_LIBRARY_PATH:-}" }

[feature.embeddings.tasks]
install-champollion = "cd external/champollion_V1 && pip install -e . --no-deps"
install-utils = """
  cd .. && git clone https://github.com/neurospin/champollion_utils.git 2>/dev/null || echo 'champollion_utils already exists' && \
  cd champollion_utils && pip install -e . && cd ..
"""
install-embeddings = { depends-on = ["install-champollion", "install-utils"] }
update = """
  git fetch && git checkout -- pixi.lock && git merge --no-edit -X theirs FETCH_HEAD && \
  git submodule update --init --remote --rebase external/champollion_V1 && \
  (cd ../champollion_utils && git pull origin master) || echo 'WARNING: champollion_utils update failed' && \
  pip install -e external/champollion_V1 --no-deps && \
  pip install -e ../champollion_utils --no-deps
"""
champollion-config = "python3 src/generate_champollion_config.py"
embeddings = "python3 src/generate_embeddings.py"
combine = "python3 src/put_together_embeddings.py"
generate-umap-reference = "python3 src/generate_umap_reference.py"
train = "python3 src/train_champollion.py"

# ── Environments ──────────────────────────────────────────────────────────────
[environments]
default        = { features = ["brainvisa", "cortical-tiles", "embeddings"] }
embeddings     = { features = ["embeddings"], no-default-feature = true, solve-group = "embeddings" }
cortical-tiles = { features = ["brainvisa", "cortical-tiles"], no-default-feature = true, solve-group = "cortical-tiles" }
brainvisa      = { features = ["brainvisa"], no-default-feature = true, solve-group = "brainvisa" }

# ── Shared tasks (available in all environments) ──────────────────────────────
[tasks]
init-submodules = "git submodule update --init --recursive"

install-utils = """
  cd .. && git clone https://github.com/neurospin/champollion_utils.git 2>/dev/null || echo 'champollion_utils already exists' && \
  cd champollion_utils && pip install -e . && cd ..
"""

setup-data = "mkdir -p ../data"

install-all = { depends-on = ["init-submodules", "install-cortical-tiles", "install-champollion", "install-utils", "setup-data", "test-smoke"] }

update-pipeline = "git fetch && git checkout -- pixi.lock && git merge --no-edit -X theirs FETCH_HEAD"

update-submodules = """
  git submodule update --init --remote --rebase external/champollion_V1 && \
  git submodule update --init --remote --rebase external/cortical_tiles
"""

update-utils = """
  cd ../champollion_utils && git pull origin master || echo 'WARNING: champollion_utils update failed — check the error above'
"""

reinstall-packages = { cmd = """
  SKLEARN_ALLOW_DEPRECATED_SKLEARN_PACKAGE_INSTALL=True pip install -e external/cortical_tiles --no-deps && \
  pip install -e external/champollion_V1 --no-deps && \
  pip install -e ../champollion_utils --no-deps
""", depends-on = ["update-submodules", "update-utils"] }

update = { depends-on = ["update-pipeline", "reinstall-packages"] }

uninstall = """
  git submodule deinit -f external/champollion_V1 && \
  git submodule deinit -f external/cortical_tiles && \
  rm -rf external/champollion_V1 external/cortical_tiles && \
  rm -rf ../champollion_utils && \
  pip uninstall dracopy cortical_tiles champollion_V1 champollion_utils -y && \
  rm -rf data && \
  echo "Uninstallation complete."
"""

uninstall-all = """
  rm -rf .pixi pixi.lock && \
  rm -rf external/champollion_V1 external/cortical_tiles && \
  rm -rf ../champollion_utils && \
  rm -rf data && \
  echo "Uninstallation of Pixi-managed dependencies complete."
"""

lint = "ruff check src/ tests/"
lint-fix = "ruff check --fix src/ tests/"
format = "ruff format src/ tests/"
audit = "pip-audit"

test = "pytest tests/ -v"
test-unit = "pytest tests/ -v -m unit"
test-integration = "pytest tests/ -v -m integration"
test-smoke = "pytest tests/ -v -m smoke"
test-cov = "pytest tests/ -v --cov=src --cov-report=html --cov-report=term"
test-fast = "pytest tests/ -v -x --tb=short"
test-verbose = "pytest tests/ -vv"
test-specific = "pytest"

generate-masks = "python3 src/generate_masks.py"
check-labeling = "python3 src/check_labeling.py"
compare-databases = "python3 src/compare_databases.py"
